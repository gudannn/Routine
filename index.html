<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Routine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg: #ffffff;
    --surface-1: #f5f4f1;
    --surface-2: #ebe9e4;
    --border: #dbd8d0;
    --text-primary: #283618;
    --text-secondary: #766f60;
    --text-muted: #9a9384;
    --brass: #a9762a;
    --brass-dim: #cba25a;
    --steel: #4d6a80;
    --steel-dim: #b7c2ca;
    --danger: #b8604a;
    --pending: #fff3b0;
    --done-btn: #588157;
    --pending-btn: #fefae0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text-primary);font-family:'Inter',sans-serif;}
  body{padding: 20px 16px 48px; max-width: 460px; margin: 0 auto;}
  h1,h2,h3{font-family:'Oswald',sans-serif; margin:0; text-transform:uppercase; letter-spacing:0.03em;}
  .mono{font-family:'JetBrains Mono',monospace;}

  header{display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:18px;}
  header .titles h1{font-size:22px; font-weight:700; color:var(--text-primary);}
  header .titles p{margin:4px 0 0; font-size:13px; color:var(--text-secondary); font-family:'Inter',sans-serif; text-transform:none; letter-spacing:0;}
  .streak{text-align:right;}
  .streak .num{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:600; color:#606c38; line-height:1;}
  .streak .lbl{font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:2px;}

  .stepper-wrap{margin: 8px 0 22px; padding: 20px 14px 16px; background:var(--surface-1); border:1px solid var(--border); border-radius:14px;}
  .stepper{display:flex; align-items:flex-start;}
  .step{display:flex; flex-direction:column; align-items:center; flex:0 0 auto;}
  .step-circle{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-weight:600; font-size:13px; transition: background .2s, color .2s;}
  .step-circle svg{width:16px; height:16px;}
  .step-label{margin-top:9px; font-size:11px; color:var(--text-secondary); text-align:center; max-width:70px;}
  .step-line{flex:1; height:2px; margin-top:17px;}

  .session{background:var(--surface-1); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:14px; transition: border-color .2s; border-left: 4px solid var(--pending);}
  .session.done{border-color: var(--border); border-left-color: #a9e0b4;}
  .session-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:4px;}
  .session-time{display:flex; align-items:baseline; gap:10px;}
  .session-time .time{font-family:'JetBrains Mono',monospace; font-size:19px; font-weight:600; color:#606c38;}
  .session.done .session-time .time{color:#606c38;}
  .session-time .name{font-family:'Oswald',sans-serif; font-size:15px; font-weight:600; letter-spacing:0.02em; color:var(--text-primary);}
  .status-pill{font-size:10px; text-transform:uppercase; letter-spacing:0.08em; padding:4px 9px; border-radius:20px; background:var(--pending-btn); color:#3d2b12; border:1px solid #e6dba0;}
  .session.done .status-pill{background:#dcf5e0; color:#1e7a34; border-color:#a9e0b4;}

  .exercise{display:flex; align-items:center; gap:12px; padding:10px 0; border-top:1px solid var(--border);}
  .exercise input[type=checkbox]{appearance:none; -webkit-appearance:none; width:22px; height:22px; min-width:22px; border-radius:6px; border:1.5px solid var(--steel-dim); background:transparent; cursor:pointer; position:relative;}
  .exercise input[type=checkbox]:checked{background:#588157; border-color:#588157;}
  .exercise input[type=checkbox]:checked::after{content:''; position:absolute; left:6px; top:2px; width:5px; height:10px; border:solid var(--bg); border-width:0 2px 2px 0; transform:rotate(40deg);}
  .exercise-info{flex:1;}
  .exercise-info .ex-name{font-size:14px; font-weight:500; color:var(--text-primary);}
  .exercise-info .ex-name.struck{color:var(--text-muted); text-decoration: line-through;}
  .exercise-info .ex-detail{font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-secondary); margin-top:2px;}

  .session-btn{width:100%; margin-top:12px; padding:11px; border-radius:10px; border:1px solid #e6dba0; background:var(--pending-btn); color:var(--text-primary); font-family:'Inter',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.02em; cursor:pointer; text-transform:uppercase;}
  .session-btn.done{background:var(--done-btn); border-color:#3f6440; color:#ffffff;}
  .session-btn:active{transform: scale(0.98);}

  .history{background:var(--surface-1); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:8px;}
  .history h3{font-size:13px; color:var(--text-secondary); margin-bottom:12px; font-weight:600;}
  .dots{display:flex; justify-content:space-between;}
  .dot-col{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .dot-col .lbl{font-size:10px; color:var(--text-muted); text-transform:uppercase;}
  .dot{width:12px; height:12px; border-radius:3px; background:var(--surface-2); border:1px solid var(--border);}
  .dot.d1{background:var(--steel-dim); border-color:var(--steel-dim);}
  .dot.d2{background:var(--steel); border-color:var(--steel);}
  .dot.d3{background:var(--brass); border-color:var(--brass);}

  .note{margin-top:18px; font-size:12px; line-height:1.6; color:var(--text-muted); padding: 0 2px;}
  .note b{color:var(--text-secondary); font-weight:600;}
</style>
</head>
<body>

<header>
  <div class="titles">
    <h1>Routine</h1>
    <p id="today-label">Loading...</p>
  </div>
  <div class="streak">
    <div class="num mono" id="streak-num">0</div>
    <div class="lbl">day streak</div>
  </div>
</header>

<div class="history">
  <h3>This week</h3>
  <div class="dots" id="dots"></div>
</div>

<div class="stepper-wrap">
  <div class="stepper" id="stepper"></div>
</div>

<div id="sessions"></div>

<div class="note">
  <b>Progression:</b> once a session feels easy at the top of its rep range for two sessions in a row, move the dumbbell up one notch (2 → 4 → 6 → 8kg), or add 2 reps per set.
</div>

<script>
const SESSIONS = [
  {
    id: 's1', time: '09:00', name: 'Push start',
    exercises: [
      { name: 'Pushups', detail: '3 sets x 10' },
      { name: 'Bicep curls', detail: '3 sets x 12, 4kg' }
    ]
  },
  {
    id: 's2', time: '12:00', name: 'Midday pump',
    exercises: [
      { name: 'Hammer curls', detail: '3 sets x 12, 4kg' },
      { name: 'Overhead triceps extension', detail: '3 sets x 10, 4kg' }
    ]
  },
  {
    id: 's3', time: '16:00', name: 'Finisher',
    exercises: [
      { name: 'Pushups', detail: '3 sets x 10' },
      { name: 'Shoulder press', detail: '3 sets x 10, 3kg' }
    ]
  }
];

function todayKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function fmtLabel(){
  return new Date().toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric' });
}

let state = { checks: {}, history: {} };

async function loadState(){
  try{
    const res = await window.storage.get('iron-log-state', false);
    if(res && res.value){
      state = JSON.parse(res.value);
    }
  }catch(e){
    state = { checks: {}, history: {} };
  }
  if(!state.checks) state.checks = {};
  if(!state.history) state.history = {};
}

async function saveState(){
  try{
    await window.storage.set('iron-log-state', JSON.stringify(state), false);
  }catch(e){
    console.error('save failed', e);
  }
}

function getDayChecks(dateKey){
  if(!state.checks[dateKey]){
    state.checks[dateKey] = SESSIONS.map(s => s.exercises.map(() => false));
  }
  return state.checks[dateKey];
}

function sessionDone(dateKey, sIdx){
  const day = getDayChecks(dateKey);
  return day[sIdx].every(v => v === true);
}

function completedCountToday(){
  const key = todayKey();
  let c = 0;
  SESSIONS.forEach((s, i) => { if(sessionDone(key, i)) c++; });
  return c;
}

function computeStreak(){
  let streak = 0;
  let d = new Date();
  while(true){
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const day = state.checks[key];
    const allDone = day && day.every(sess => sess.every(v => v === true));
    if(allDone){
      streak++;
      d.setDate(d.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

const CHECK_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

function renderStepper(){
  const key = todayKey();
  const doneFlags = SESSIONS.map((s, i) => sessionDone(key, i));
  const firstIncomplete = doneFlags.findIndex(d => !d);

  const el = document.getElementById('stepper');
  let html = '';

  SESSIONS.forEach((s, i) => {
    const isDone = doneFlags[i];
    const isActive = !isDone && i === firstIncomplete;

    let circleStyle, inner;
    if(isDone){
      circleStyle = 'background:#dcf5e0; color:#588157;';
      inner = CHECK_SVG;
    } else if(isActive){
      circleStyle = 'background:#588157; color:#ffffff;';
      inner = (i + 1);
    } else {
      circleStyle = 'background:var(--surface-2); color:var(--text-muted);';
      inner = (i + 1);
    }

    html += `
      <div class="step">
        <div class="step-circle" style="${circleStyle}">${inner}</div>
        <div class="step-label">${s.time}</div>
      </div>`;

    if(i < SESSIONS.length - 1){
      const lineColor = isDone ? '#a9e0b4' : 'var(--border)';
      html += `<div class="step-line" style="background:${lineColor};"></div>`;
    }
  });

  el.innerHTML = html;
}

function renderSessions(){
  const container = document.getElementById('sessions');
  const key = todayKey();
  const dayChecks = getDayChecks(key);
  container.innerHTML = '';

  SESSIONS.forEach((s, sIdx) => {
    const done = sessionDone(key, sIdx);
    const card = document.createElement('div');
    card.className = 'session' + (done ? ' done' : '');

    let exercisesHtml = '';
    s.exercises.forEach((ex, eIdx) => {
      const checked = dayChecks[sIdx][eIdx];
      exercisesHtml += `
        <div class="exercise">
          <input type="checkbox" data-s="${sIdx}" data-e="${eIdx}" ${checked ? 'checked' : ''}>
          <div class="exercise-info">
            <div class="ex-name ${checked ? 'struck' : ''}">${ex.name}</div>
            <div class="ex-detail mono">${ex.detail}</div>
          </div>
        </div>`;
    });

    card.innerHTML = `
      <div class="session-head">
        <div class="session-time">
          <span class="time mono">${s.time}</span>
          <span class="name">${s.name}</span>
        </div>
        <span class="status-pill">${done ? 'Done' : 'Pending'}</span>
      </div>
      ${exercisesHtml}
      <button class="session-btn ${done ? 'done' : ''}" data-toggle="${sIdx}">
        ${done ? 'Session complete' : 'Mark all done'}
      </button>
    `;
    container.appendChild(card);
  });

  container.querySelectorAll('input[type=checkbox]').forEach(cb => {
    cb.addEventListener('change', async (e) => {
      const sIdx = parseInt(e.target.dataset.s);
      const eIdx = parseInt(e.target.dataset.e);
      const day = getDayChecks(todayKey());
      day[sIdx][eIdx] = e.target.checked;
      await saveState();
      renderAll();
    });
  });

  container.querySelectorAll('[data-toggle]').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      const sIdx = parseInt(e.currentTarget.dataset.toggle);
      const day = getDayChecks(todayKey());
      const isDone = day[sIdx].every(v => v === true);
      day[sIdx] = day[sIdx].map(() => !isDone);
      await saveState();
      renderAll();
    });
  });
}

function renderHistory(){
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = '';
  const today = new Date();
  const dayOfWeek = today.getDay();
  const offsetFromMonday = (dayOfWeek + 6) % 7;
  const monday = new Date(today);
  monday.setDate(today.getDate() - offsetFromMonday);

  const days = [];
  for(let i = 0; i < 7; i++){
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    const dayChecks = state.checks[key];
    let count = 0;
    if(dayChecks){
      dayChecks.forEach(sess => { if(sess.every(v => v === true)) count++; });
    }
    days.push({ label: d.toLocaleDateString(undefined, { weekday: 'narrow' }), count });
  }
  days.forEach(d => {
    const col = document.createElement('div');
    col.className = 'dot-col';
    const dotClass = d.count === 0 ? '' : d.count === 1 ? 'd1' : d.count === 2 ? 'd2' : 'd3';
    col.innerHTML = `<div class="dot ${dotClass}"></div><div class="lbl">${d.label}</div>`;
    dotsEl.appendChild(col);
  });
}

function renderStreak(){
  document.getElementById('streak-num').textContent = computeStreak();
}

function renderAll(){
  document.getElementById('today-label').textContent = fmtLabel();
  renderSessions();
  renderStepper();
  renderHistory();
  renderStreak();
}

(async function init(){
  await loadState();
  renderAll();
})();
</script>

</body>
</html>
